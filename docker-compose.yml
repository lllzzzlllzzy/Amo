services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: amo
      POSTGRES_USER: amo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amo"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://amo:${POSTGRES_PASSWORD}@db:5432/amo}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_SMART_MODEL: ${ANTHROPIC_SMART_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_FAST_MODEL: ${ANTHROPIC_FAST_MODEL:-claude-haiku-4-5}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
